backend:
  name: github
  repo: jl69lucas-netizen/bluestaffyuk-uk
  branch: main
  base_url: https://NETLIFY_OAUTH_GATEWAY_PLACEHOLDER

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "locations"
    label: "UK Location Pages"
    label_singular: "Location Page"
    folder: "_data/locations"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "City / Region", name: "city", widget: "string" }
      - label: "UK Region"
        name: "region"
        widget: "select"
        options:
          ["London", "South East", "South West", "East of England", "East Midlands",
           "West Midlands", "Yorkshire", "North West", "North East", "Scotland",
           "Wales", "Northern Ireland"]
        required: false
      - { label: "Page Heading", name: "heading", widget: "string" }
      - { label: "Local Content", name: "content", widget: "markdown" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Focus Keyword", name: "focus_keyword", widget: "string", required: false }
          - { label: "OG Title", name: "og_title", widget: "string", required: false }
          - { label: "OG Description", name: "og_description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonical", widget: "string", required: false }

  - name: "blog"
    label: "Blog"
    label_singular: "Blog Post"
    folder: "_data/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "date", format: "YYYY-MM-DD" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Breed Info", "Puppy Buying Guide", "Training", "Health & Nutrition", "Care Tips", "News"]
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Content", name: "body", widget: "markdown" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        collapsed: true
        fields:
          - { label: "Page Title", name: "title", widget: "string", required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false }
          - { label: "Focus Keyword", name: "focus_keyword", widget: "string", required: false }

  - name: "redirects"
    label: "URL Redirects"
    files:
      - name: "redirects_list"
        label: "Redirect Rules"
        file: "_data/redirects.json"
        fields:
          - label: "Redirects"
            name: "redirects"
            widget: "list"
            fields:
              - { label: "From (old URL path)", name: "from", widget: "string" }
              - { label: "To (new URL path)", name: "to", widget: "string" }
              - label: "Status Code"
                name: "status"
                widget: "select"
                options: ["301", "302"]
                default: "301"

  - name: "site_settings"
    label: "Site Settings & SEO"
    files:
      - name: "global_seo"
        label: "Global SEO Defaults"
        file: "_data/settings.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Site URL", name: "site_url", widget: "string" }
          - { label: "Default Meta Title", name: "default_title", widget: "string" }
          - { label: "Default Meta Description", name: "default_description", widget: "text" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Google Analytics ID", name: "ga_id", widget: "string", required: false }
          - label: "Organization Schema"
            name: "schema_org"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Business Name", name: "name", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Logo URL", name: "logo", widget: "string", required: false }
              - { label: "Address", name: "address", widget: "string", required: false }
      - name: "homepage_seo"
        label: "Homepage SEO"
        file: "_data/pages/homepage.json"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Focus Keyword", name: "focus_keyword", widget: "string", required: false }
          - { label: "OG Title", name: "og_title", widget: "string", required: false }
          - { label: "OG Description", name: "og_description", widget: "text", required: false }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Canonical URL", name: "canonical", widget: "string", required: false }
          - { label: "H1 Heading", name: "h1", widget: "string", required: false }
          - { label: "Hero Subheading", name: "subheading", widget: "text", required: false }
